<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mina Eyebrow Tints · AI Automation Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <p class="loading-msg">Loading dashboard…</p>
  </div>

  <script>
  const inr      = n => '₹' + Math.round(n).toLocaleString('en-IN');
  const xRoas    = n => n.toFixed(1) + '×';
  const pctWhole = n => Math.round(n * 100) + '%';
  const intFmt   = n => Math.round(n).toLocaleString('en-IN');

  function inrShort(n) {
    const a = Math.abs(n);
    if (a >= 1e7) return '₹' + (n / 1e7).toFixed(1) + 'Cr';
    if (a >= 1e5) return '₹' + (n / 1e5).toFixed(1) + 'L';
    if (a >= 1e3) return '₹' + (n / 1e3).toFixed(1) + 'K';
    return '₹' + Math.round(n);
  }
  const clock = iso => iso ? new Date(iso).toLocaleTimeString('en-IN',
                       { hour: 'numeric', minute: '2-digit', hour12: true }) : '—';

  const state = { range: '7 days', channel: 'All', data: null, syncing: false };

  function getWindowDays() {
    if (state.range === 'Today') return 1;
    if (state.range === '30 days') return 30;
    const parsed = parseInt(state.range);
    return isNaN(parsed) ? 7 : parsed;
  }

  async function loadData() {
    const days = getWindowDays();
    try {
      const res = await fetch(`/api/dashboard?window_days=${days}`);
      const d = await res.json();
      if (!d.ready) { setTimeout(loadData, 1000); return; }
      state.data = d;
      render();
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<p class="error-msg">Could not reach the backend. Run <code>python app.py</code> first.</p>';
    }
  }

  async function refresh() {
    state.syncing = true; render();
    try {
      await fetch('/api/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ window_days: getWindowDays() }),
      });
      await loadData();
    } finally { state.syncing = false; render(); }
  }

  function deltaHtml(value, prev, goodUp, fmt) {
    if (prev == null) return '';
    const diff = value - prev;
    const pct = prev ? diff / prev : 0;
    const flat = Math.abs(pct) < 0.005;
    const up = diff > 0;
    let cls = 'delta-flat';
    if (!flat && goodUp !== null) cls = (up === goodUp) ? 'up-good' : 'up-bad';
    const arrow = flat ? '→' : up ? '▲' : '▼';
    const shown = fmt === 'x' ? xRoas(Math.abs(diff))
                : fmt === 'int' ? intFmt(Math.abs(diff)) : inrShort(Math.abs(diff));
    return `<span class="kpi-delta ${cls} num">${arrow} ${shown}
            <span class="delta-pct">(${pctWhole(Math.abs(pct))})</span></span>`;
  }

  function briefBlock(kicker, cls, items) {
    if (!items || !items.length) return '';
    const lines = items.map((t, i) =>
      `<div class="brief-text" style="margin-top:${i ? 6 : 0}px">${t}</div>`).join('');
    return `<div class="brief-row ${cls}"><div>
              <div class="brief-kicker">${kicker}</div>${lines}
            </div></div>`;
  }

  function render() {
    const d = state.data;
    if (!d) return;

    const k = d.kpis;
    const lastSync = (d.sources.find(s => s.source === 'Shopify') || {}).lastSynced;
    const metaAttrib = d.attribution.find(a => a.name.startsWith('Meta'));
    const googleAttrib = d.attribution.find(a => a.name.startsWith('Google'));

    const header = `
      <header class="header">
        <div class="header-left">
          <div class="brand-mark">m</div>
          <div>
            <div class="brand-name">Mina Eyebrow Tints · AI Automation Dashboard</div>
            <div class="brand-sub">minaeyebrowtints.in · synced ${clock(lastSync)} IST</div>
          </div>
        </div>
        <button class="btn" id="refreshBtn" ${state.syncing ? 'disabled' : ''}>
          <span class="${state.syncing ? 'spin' : ''}">↻</span>
          ${state.syncing ? 'Syncing…' : 'Refresh'}
        </button>
      </header>`;

    const seg = (opts, cur, group) => `<div class="seg">${opts.map(o =>
      `<button class="${cur === o ? 'active' : ''}" data-${group}="${o}">${o}</button>`).join('')}</div>`;

    const toolbar = `<div class="toolbar">
        <span class="toolbar-label">Range</span>${seg(['Today', '7 days', '30 days'], state.range, 'range')}
        <span class="toolbar-label">Channel</span>${seg(['All', 'Meta', 'Google'], state.channel, 'channel')}
      </div>`;

    const tiles = [
      ['Total Shopify revenue', k.trueRevenue],
      ['Total ad spend', k.adSpend],
      ['MER', k.mer],
      ['Blended CAC', k.cac],
      ['Orders', k.orders],
      ['AOV', k.aov],
    ];
    const fmtValue = (v, f) => f === 'inr' ? inr(v) : f === 'x' ? xRoas(v)
                             : f === 'int' ? intFmt(v) : v;

    const kpiRow = `<div class="kpi-grid">${tiles.map(([label, t]) => `
      <div class="kpi">
        <div class="kpi-label">${label}</div>
        <div class="kpi-value num">${fmtValue(t.value, t.fmt)}</div>
        ${deltaHtml(t.value, t.prev, t.goodUp, t.fmt)}
      </div>`).join('')}</div>`;

    const channelSpend = `
      <div class="channel-spend">
        <span class="cs-label">Channel spend</span>
        <span class="cs-item"><strong>Meta</strong> <span class="num">${inr(metaAttrib.spend)}</span></span>
        <span class="cs-sep">·</span>
        <span class="cs-item"><strong>Google</strong> <span class="num">${inr(googleAttrib.spend)}</span></span>
        <span class="cs-sep">·</span>
        <span class="cs-item"><strong>Total</strong> <span class="num">${inr(k.adSpend.value)}</span></span>
      </div>`;

    const b = d.briefing;
    const todoList = b.todo.map((t, i) =>
      `<div class="todo"><span class="todo-rank num">${i + 1}</span>
       <span class="brief-text">${t}</span></div>`).join('');

    const briefing = `
      <div class="card">
        <div class="card-head">
          <div class="card-title">AI daily insights</div>
          <span class="card-sub">Shopify reconciled revenue is source of truth</span>
        </div>
        <div class="brief-kicker">What changed?</div>
        <div class="brief-text changed-line">${b.changed}</div>
        <div class="briefing-grid">
          ${briefBlock('What improved', 'brief-good', b.improved)}
          ${briefBlock('What got worse', 'brief-bad', b.worse)}
          ${briefBlock('What is stuck', 'brief-warn', b.stuck)}
          ${b.escalate.length ? briefBlock('What needs escalation', 'brief-escalate', b.escalate) : ''}
          <div class="brief-row brief-do"><div style="width:100%">
            <div class="brief-kicker">What should we do today?</div>
            <div class="todo-list">${todoList}</div>
          </div></div>
        </div>
      </div>`;

    function attribCard(a) {
      if (!a) return '';
      return `
        <div class="card">
          <div class="card-head">
            <div class="card-title">${a.name}</div>
            <span class="card-sub">Spend ${inr(a.spend)}</span>
          </div>
          <div class="roas-row">
            <div class="roas-box">
              <div class="lbl">1-day click ROAS</div>
              <div class="val num">${xRoas(a.roas1d)}</div>
              <div class="card-sub">Immediate purchase intent</div>
            </div>
            <div class="roas-box">
              <div class="lbl">7-day click ROAS</div>
              <div class="val num">${xRoas(a.roas7d)}</div>
              <div class="card-sub">Delayed ad impact</div>
            </div>
          </div>
          <div class="reconcile-line"><span class="rl-label">Platform revenue (1-day click)</span>
            <span class="rl-val num">${inr(a.reportedRev1d)}</span></div>
          <div class="reconcile-line"><span class="rl-label">Platform revenue (7-day click)</span>
            <span class="rl-val num">${inr(a.reportedRev7d)}</span></div>
          <div class="reconcile-line"><span class="rl-label">Shopify actual (reconciled)</span>
            <span class="rl-val num">${inr(a.trueRev)}</span></div>
          <div class="reconcile-line diff-line"><span class="rl-label">Platform vs Shopify gap</span>
            <span class="rl-val num over-report">+${inr(a.overReportAbs)} (${pctWhole(a.overReportPct)})</span></div>
        </div>`;
    }

    const attribSection = d.attribution
      .filter(a => state.channel === 'All' || a.name.startsWith(state.channel))
      .map(attribCard).join('');

    const funnel = `
      <div class="card">
        <div class="card-head">
          <div class="card-title">Shopify funnel</div>
          <span class="card-sub">${state.range}</span>
        </div>
        <div class="funnel">${d.funnel.map(s => `
          <div class="funnel-step">
            <div class="funnel-meta">
              <span class="fs-label">${s.label}${s.stepRate != null ?
                `<span class="fs-rate num">${pctWhole(s.stepRate)} of prev</span>` : ''}</span>
              <span class="fs-count num">${intFmt(s.count)}</span>
            </div>
            <div class="funnel-track"><div class="funnel-fill" style="width:${Math.max(s.pct * 100, 2)}%"></div></div>
          </div>`).join('')}</div>
      </div>`;

    const skus = `
      <div class="card">
        <div class="card-head">
          <div class="card-title">SKU performance</div>
          <span class="card-sub">Revenue, units & inventory</span>
        </div>
        <table class="tbl">
          <thead><tr>
            <th>Product</th><th class="r">Units</th><th class="r">Revenue</th>
            <th class="r hide-sm">Stock</th><th class="r hide-sm">Cover</th>
          </tr></thead>
          <tbody>${d.skus.map(s => `
            <tr>
              <td><div class="sku-name">${s.name}</div><div class="sku-sub num">${s.sku}</div></td>
              <td class="r num">${intFmt(s.units)}</td>
              <td class="r num">${inr(s.revenue)}</td>
              <td class="r num hide-sm">${intFmt(s.inventory)}</td>
              <td class="r hide-sm">${s.stockOut
                ? `<span class="warn-tag">${Math.round(s.daysToStockOut)}d left</span>`
                : `<span class="num muted">${Math.round(s.daysToStockOut)}d</span>`}</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`;

    const actionClass = { scale: 'act-scale', cut: 'act-cut', hold: 'act-hold', keep: 'act-keep' };
    const camps = d.campaigns.filter(c => state.channel === 'All' || c.channel === state.channel);
    const campaigns = `
      <div class="card">
        <div class="card-head">
          <div class="card-title">Campaign AI recommendations</div>
          <span class="card-sub">Judged on true ROAS, not platform numbers</span>
        </div>
        <table class="tbl">
          <thead><tr>
            <th>Campaign</th><th class="r">Spend</th><th class="r">1d ROAS</th>
            <th class="r">7d ROAS</th><th class="r hide-sm">True ROAS</th><th>Action</th>
          </tr></thead>
          <tbody>${camps.map(c => `
            <tr>
              <td>
                <div class="sku-name">${c.name}</div>
                <div class="sku-sub">${c.channel} · ${c.type}</div>
                <div class="campaign-why">${c.why}</div>
              </td>
              <td class="r num">${inr(c.spend)}</td>
              <td class="r num">${xRoas(c.roas1d)}</td>
              <td class="r num">${xRoas(c.roas7d)}</td>
              <td class="r num hide-sm">${xRoas(c.trueRoas)}</td>
              <td><span class="action-pill ${actionClass[c.action]}">${c.label}</span></td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`;

    document.getElementById('app').innerHTML =
      header + toolbar + kpiRow + channelSpend + briefing +
      `<div class="section-title">Attribution · 1-day vs 7-day, platform vs Shopify</div>
       <div class="attrib-grid">${attribSection}</div>
       <div class="section-title">Store performance</div>
       <div class="grid-2">${funnel}${skus}</div>
       <div class="section-title">Campaign actions</div>${campaigns}`;

    document.getElementById('refreshBtn').onclick = refresh;
    document.querySelectorAll('[data-range]').forEach(el =>
      el.onclick = () => { state.range = el.dataset.range; loadData(); });
    document.querySelectorAll('[data-channel]').forEach(el =>
      el.onclick = () => { state.channel = el.dataset.channel; render(); });
  }

  loadData();
  </script>
</body>
</html>
